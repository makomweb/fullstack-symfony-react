nelmio_cors:
    defaults:
        allow_origin: ['*']
        allow_methods: ['POST', 'PATCH', 'PUT', 'GET', 'DELETE', 'OPTIONS']
        allow_headers: ['authorization', 'accept', 'content-type', 'traceparent', 'Cookie']
        expose_headers: []
        max_age: 3600
        allow_credentials: true
    paths:
        '^/': ~
