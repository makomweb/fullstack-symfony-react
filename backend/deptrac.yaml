deptrac:
  paths:
    - ./src
    - ./tests
  exclude_files: ~
    # - '#.*test.*#'
  layers:
    - name: Core
      collectors:
        - type: classLike
          value: .*App\\Game\\.*
        - type: classLike
          value: .*App\\Invariant\\.*
        - type: classLike
          value: .*PHPMolecules\\.*
        - type: classLike
          value: .*App\\Timer\\.*
    - name: Generic
      collectors:
        - type: classLike
          value: .*AutoMapper\\.*
        - type: classLike
          value: .*Doctrine\\.*
        - type: classLike
          value: .*EasyCorp\\Bundle\\EasyAdminBundle\\.*
        - type: classLike
          value: .*Faker\\Factory.*
        - type: classLike
          value: .*Monolog\\.*
        - type: classLike
          value: .*OpenApi\\Attributes\\.*
        - type: classLike
          value: .*OpenTelemetry\\.*
        - type: classLike
          value: .*phpDocumentor\\Reflection\\.*
        - type: classLike
          value: .*PhpParser\\.*
        - type: classLike
          value: .*PHPUnit\\Framework\\.*
        - type: classLike
          value: .*Psr\\.*
        - type: classLike
          value: .*Symfony\\.*
        - type: classLike
          value: .*Tactix\\.*
    - name: Supporting
      collectors:
        - type: classLike
          value: .*App\\Async\\.*
        - type: classLike
          value: .*App\\Auth\\.*
        - type: classLike
          value: .*App\\Cache\\.*
        - type: classLike
          value: .*App\\CloudEvent\\.*
        - type: classLike
          value: .*App\\Controller\\.*
        - type: classLike
          value: .*App\\Converter\\.*
        - type: classLike
          value: .*App\\DataFixtures\\.*
        - type: classLike
          value: .*App\\Entity\\.*
        - type: classLike
          value: .*App\\Instrumentation\\.*
        - type: classLike
          value: .*App\\Listener\\.*
        - type: classLike
          value: .*App\\Repository\\.*
    - name: Tests
      collectors:
        - type: classLike
          value: .*App\\Tests\\.*
  ruleset:
    Core: ~
    Generic: ~
    Supporting:
      - Core
      - Generic
    Tests:
      - Core
      - Supporting
