apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
    app: web
spec:
  type: NodePort
  selector:
    {{- include "fullstack.selectorLabels" . | nindent 4 }}
    app: web
  ports:
  - port: 80
    targetPort: http
    nodePort: {{ .Values.nginx.nodePort }}
    name: http
