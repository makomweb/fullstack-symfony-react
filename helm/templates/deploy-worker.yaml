apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fullstack.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
    app: worker
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "fullstack.selectorLabels" . | nindent 6 }}
      app: worker
  template:
    metadata:
      labels:
        {{- include "fullstack.selectorLabels" . | nindent 8 }}
        app: worker
    spec:
      containers:
      - name: worker
        image: {{ .Values.app.image }}
        imagePullPolicy: IfNotPresent
        command: ["php", "bin/console", "messenger:consume", "async", "-vv"]
        envFrom:
        - configMapRef:
            name: {{ include "fullstack.fullname" . }}-app-config
        env:
        - name: DATABASE_URL
          value: "mysql://{{ .Values.database.env.MYSQL_USER }}:{{ .Values.database.env.MYSQL_PASSWORD }}@db:3306/{{ .Values.database.env.MYSQL_DATABASE }}"
        - name: REDIS_URL
          value: "redis://cache:6379"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://lgtm:{{ .Values.observability.ports.otelHttp }}"
        - name: MESSENGER_TRANSPORT_DSN
          value: {{ .Values.app.env.MESSENGER_TRANSPORT_DSN | quote }}
        - name: APP_SECRET
          value: {{ .Values.app.secret | quote }}
      initContainers:
      - name: wait-for-db
        image: busybox:latest
        command: ['sh', '-c', 'until nc -z db 3306; do echo waiting for db; sleep 2; done']
      - name: wait-for-rabbitmq
        image: busybox:latest
        command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done']

