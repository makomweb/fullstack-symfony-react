apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
    app: app
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "fullstack.selectorLabels" . | nindent 6 }}
      app: app
  template:
    metadata:
      labels:
        {{- include "fullstack.selectorLabels" . | nindent 8 }}
        app: app
    spec:
      containers:
      - name: nginx
        image: {{ .Values.nginx.image }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.nginx.port }}
          name: http
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        - name: app-files
          mountPath: /var/www/project
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
      - name: app
        image: {{ .Values.app.image }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.app.port }}
          name: fpm
        volumeMounts:
        - name: app-files
          mountPath: /var/www/project
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: OTEL_SERVICE_NAME
          value: "app"
        livenessProbe:
          tcpSocket:
            port: fpm
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: fpm
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: app-files
        emptyDir: {}
      initContainers:
      - name: copy-app-files
        image: {{ .Values.app.image }}
        imagePullPolicy: Always
        command: ['sh', '-c', 'cp -r /var/www/project/. /app-files/']
        volumeMounts:
        - name: app-files
          mountPath: /app-files
      - name: wait-for-db
        image: busybox:latest
        command: ['sh', '-c', 'until nc -z db 3306; do echo waiting for db; sleep 2; done']
      - name: wait-for-cache
        image: busybox:latest
        command: ['sh', '-c', 'until nc -z cache 6379; do echo waiting for cache; sleep 2; done']
