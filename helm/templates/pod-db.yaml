apiVersion: v1
kind: Pod
metadata:
  name: db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
    app: db
spec:
  containers:
  - name: mysql
    image: {{ .Values.database.image }}
    ports:
    - containerPort: {{ .Values.database.port }}
      name: mysql
    env:
    - name: MYSQL_ROOT_PASSWORD
      value: {{ .Values.database.env.MYSQL_ROOT_PASSWORD | quote }}
    - name: MYSQL_DATABASE
      value: {{ .Values.database.env.MYSQL_DATABASE | quote }}
    - name: MYSQL_USER
      value: {{ .Values.database.env.MYSQL_USER | quote }}
    - name: MYSQL_PASSWORD
      value: {{ .Values.database.env.MYSQL_PASSWORD | quote }}
    livenessProbe:
      exec:
        command:
        - mysqladmin
        - ping
        - -h
        - localhost
      initialDelaySeconds: 30
      periodSeconds: 10
    readinessProbe:
      exec:
        command:
        - mysqladmin
        - ping
        - -h
        - localhost
      initialDelaySeconds: 5
      periodSeconds: 10
  restartPolicy: Always

  # DOCUMENTATION:
  # For PRODUCTION use StatefulSet instead of Pod!
  # 
  # Reason: This Pod configuration is ephemeral - data is lost on pod restart.
  # 
  # Production setup should use:
  # 1. StatefulSet with persistent storage
  # 2. PersistentVolume (PV) for actual storage
  # 3. PersistentVolumeClaim (PVC) to attach PV to pod
  # 
  # Example production StatefulSet structure:
  # apiVersion: apps/v1
  # kind: StatefulSet
  # metadata:
  #   name: {{ include "fullstack.fullname" . }}-db
  # spec:
  #   serviceName: db
  #   replicas: 1
  #   selector:
  #     matchLabels:
  #       app: db
  #   template:
  #     # ... pod spec above ...
  #     spec:
  #       containers:
  #       - name: mysql
  #         volumeMounts:
  #         - name: mysql-data
  #           mountPath: /var/lib/mysql
  #   volumeClaimTemplates:
  #   - metadata:
  #       name: mysql-data
  #     spec:
  #       accessModes: [ "ReadWriteOnce" ]
  #       resources:
  #         requests:
  #           storage: 10Gi
