apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fullstack.fullname" . }}-nginx-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        index index.php;
        server_name localhost;
        root /var/www/project/public;
        error_log /var/log/nginx/project_error.log;
        access_log /var/log/nginx/project_access.log;

        # Serve static React app assets directly without PHP fallback
        location /dist/ {
            try_files $uri =404;
        }

        # Serve asset references from CSS/JS files (fonts, images, etc.)
        location /assets/ {
            alias /var/www/project/public/dist/assets/;
            try_files $uri =404;
        }

        location / {
            try_files $uri /index.php$is_args$args;
        }

        location ~ ^/index\.php(/|$) {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 4 256k;
            fastcgi_busy_buffers_size 256k;
            internal;
        }

        location ~ \.php$ {
            return 404;
        }
    }
