apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-cache
  labels:
    app: {{ .Release.Name }}-cache
    tier: backend
spec:
  selector:
    app: {{ .Release.Name }}-cache
  ports:
  - name: 6379-6379
    port: 6379
    protocol: TCP
    targetPort: 6379
    {{ if eq .Values.environment "dev" }}
    nodePort: {{ .Values.cache.nodePort }}
  type: NodePort
    {{ end }}