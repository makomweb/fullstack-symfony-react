apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fullstack.labels" . | nindent 4 }}
    app: app
spec:
  type: ClusterIP
  selector:
    {{- include "fullstack.selectorLabels" . | nindent 4 }}
    app: app
  ports:
  - port: 9000
    targetPort: fpm
    name: fpm
