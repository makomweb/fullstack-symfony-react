title: "Fullstack Symfony React"
subtitle: "Developer Dashboard"

header: true
footer: '<p>Created with ☯️ by <a href="https://github.com/makomweb/">Martin Komischke</a></p>'

theme: default

services:
  - name: "Application"
    icon: "fas fa-cubes"
    items:
      - name: "Manage accounts"
        subtitle: "EasyAdmin"
        icon: "fas fa-users-cog"
        url: "http://localhost:8080/admin"
        target: "_blank"
      - name: "Application (legacy)"
        subtitle: "Symfony + TWIG + MySQL"
        icon: "fas fa-mobile-retro"
        url: "http://localhost:8080"
        target: "_blank"
      - name: "Application (modern)"
        subtitle: "Symfony + React + MySQL"
        icon: "fas fa-desktop"
        url: "http://localhost:8080/spa"
        target: "_blank"
      - name: "Application (Vite HMR)"
        subtitle: "Symfony + React + MySQL"
        icon: "fas fa-tablet-screen-button"
        url: "http://localhost:5173"
        target: "_blank"

  - name: "Infrastructure"
    icon: "fas fa-server"
    items:
      - name: "Database administration"
        subtitle: "Adminer"
        icon: "fas fa-database"
        url: "http://localhost:8085/?server=db&username=root&db=app"
        target: "_blank"
      - name: "Cache"
        subtitle: "Redis Insights"
        icon: "fas fa-bolt"
        url: "http://localhost:5540"
        target: "_blank"
      - name: "Message queue"
        subtitle: "RabbitMQ"
        icon: "fas fa-stream"
        url: "http://localhost:15672"
        target: "_blank"
      - name: "Observabilty"
        subtitle: "Loki + Grafana + Tempo + Prometheus"
        icon: "fas fa-chart-line"
        url: "http://localhost:3000/dashboards"
        target: "_blank"

  - name: "Reference"
    icon: "fas fa-bookmark"
    items:
      - name: "Source code"
        subtitle: "Github"
        icon: "fa-brands fa-github"
        url: "https://github.com/makomweb/fullstack-symfony-react"
        target: "_blank"
      - name: "Documentation"
        subtitle: "arc42 + MKDocs"
        icon: "fas fa-diagram-project"
        url: "http://localhost:8005"
        target: "_blank"
      - name: "Classes report"
        subtitle: "Tactical DDD"
        icon: "fas fa-layer-group"
        url: "/public/report/index.html"
        target: "_blank"
      - name: "Code coverage"
        subtitle: "PhpUnit coverage report"
        icon: "fas fa-shield-halved"
        url: "/public/coverage/index.html"
        target: "_blank"
      - name: "API documentation"
        subtitle: "Swagger / OpenAPI"
        icon: "fas fa-circle-nodes"
        url: "http://localhost:8080/api/doc"
        target: "_blank"
